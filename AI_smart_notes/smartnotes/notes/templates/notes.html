<!DOCTYPE html>
<html>

<head>
    <title>Smart Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <script>
        function startVoice() {
            const rec = new webkitSpeechRecognition();
            rec.lang = "en-US";
            rec.onresult = function (e) {
                document.getElementById('txt').value = e.results[0][0].transcript;
            };
            rec.start();
        }

        async function addNote() {
            const text = document.getElementById('txt').value;
            const csrfToken = document.querySelector('meta[name="csrf-token"]').content;

            if (!text.trim()) {
                alert("Please enter or speak a note!");
                return;
            }

            const res = await fetch('/notes/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRFToken': csrfToken
                },
                body: new URLSearchParams({ text })
            });

            if (res.ok) {
                location.reload();
            } else {
                alert("Error saving note!");
            }

            document.getElementById('txt').value = "";
        }

        
    </script>
    <meta name="csrf-token" content="{{ csrf_token }}">
</head>

<body class="container mt-4">
    <h2>Smart Notes</h2>

    <textarea id="txt" rows="3" cols="50" placeholder="Say or type your reminder..."
        class="form-control mb-2"></textarea>
    <button onclick="startVoice()" class="btn btn-primary me-2">Speak</button>
    <button onclick="addNote()" class="btn btn-success">Save</button>

    <hr>

    <h4>Your Notes</h4>
    <ul id="notesList">
        {% for n in notes %}
        <li>{{ n.task }} | {{ n.category }} | {{ n.reminder_time }}</li>
        {% empty %}
        <li>No notes yet</li>
        {% endfor %}
    </ul>

    <a href="{% url 'home' %}" class="btn btn-link mt-3">⬅ Back</a>
</body>

</html>
